name: Frontend CI/CD to VPS

on:
    push:
        branches: ["prod"]
        tags: ["v*"]
    pull_request:
        branches: ["prod"]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest # yoki kerakli versiyani yozishingiz mumkin, masalan: 1.1.34

            - name: Cache bun dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build
              env:
                  NEXT_BUILD_WORKER_TIMEOUT: 300000

            - name: Copy build to server
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  source: ".next/**"
                  target: "/root/projects/frontend/iNexLynk_Frontend/.next"

            - name: Restart app on server
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd /root/projects/frontend/iNexLynk_Frontend
                      pm2 restart inexlynk-frontend || pm2 start bun --name "inexlynk-frontend" -- run start
                      pm2 flush
                      pm2 save

            - name: Notify Telegram (success)
              if: success()
              uses: appleboy/telegram-action@master
              with:
                  to: ${{ secrets.TELEGRAM_TO }}
                  token: ${{ secrets.TELEGRAM_TOKEN }}
                  message: |
                      ✅ Frontend CI/CD Successful 🚀
                      Repo: ${{ github.repository }}
                      Commit: ${{ github.event.head_commit.message }}
                      Author: ${{ github.actor }}
                      Branch: ${{ github.ref_name }}

            - name: Notify Telegram (failure)
              if: failure()
              uses: appleboy/telegram-action@master
              with:
                  to: ${{ secrets.TELEGRAM_TO }}
                  token: ${{ secrets.TELEGRAM_TOKEN }}
                  message: |
                      ❌ Frontend CI/CD Failed 💥
                      Repo: ${{ github.repository }}
                      Commit: ${{ github.event.head_commit.message }}
                      Author: ${{ github.actor }}
                      Branch: ${{ github.ref_name }}
